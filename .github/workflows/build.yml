name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl requests pyinstaller
          python -m playwright install chromium

      - name: Build EXE
        run: pyinstaller --onefile --name "BuscadorML" buscar_precos_ml.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BuscadorML-Windows
          path: dist/BuscadorML.exe
          retention-days: 30
